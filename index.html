<style>
/* ============================================================
   BRIO · DESIGN TOKENS
   ============================================================ */
:root{
  /* Palette ufficiale Brio (vedi BRIO_CONTEXT.md §3) */
  --onyx:        #0A0907;   /* testo primario */
  --midnight:    #1E3A8A;   /* Stefano · estremo destro gradient */
  --emerald:     #10B981;   /* Simone · estremo sinistro gradient, CTA */
  --champagne:   #EFE6D5;   /* sfondi caldi, lettering */
  --smoke:       #D6CFC0;   /* background secondari */

  /* Derivate */
  --bg:          #FFFEFA;   /* sfondo principale (champagne più chiaro) */
  --bg-soft:     #FAF6EC;
  --bg-card:     #FFFFFF;
  --line:        rgba(10,9,7, .08);
  --line-strong: rgba(10,9,7, .14);
  --text:        var(--onyx);
  --text-muted:  rgba(10,9,7, .55);
  --text-dim:    rgba(10,9,7, .35);
  --danger:      #DC2626;
  --warning:     #F59E0B;
  --success:     var(--emerald);

  /* Gradient brand */
  --grad-brio:   linear-gradient(120deg, var(--emerald) 0%, var(--midnight) 100%);

  /* Spaziature */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --r-xl: 24px;

  /* Ombre */
  --sh-1: 0 1px 2px rgba(10,9,7,.06), 0 1px 1px rgba(10,9,7,.04);
  --sh-2: 0 4px 12px rgba(10,9,7,.08), 0 2px 4px rgba(10,9,7,.04);
  --sh-3: 0 12px 32px rgba(10,9,7,.12), 0 4px 8px rgba(10,9,7,.06);

  /* Font */
  --font-display: "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-body:    "Helvetica Neue", Helvetica, Arial, sans-serif;
}

/* ============================================================
   RESET
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.45;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  min-height: 100vh;
  min-height: 100dvh;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: inherit; }
a { color: inherit; text-decoration: none; }
img, svg { display: block; max-width: 100%; }

/* ============================================================
   LOGO BRIO (lockup "b" gradient + wordmark "rio")
   ============================================================ */
.brio-logo{ display:inline-flex; align-items:baseline; gap:2px; line-height:1; font-family:var(--font-display); font-style:italic; font-weight:700; }
.brio-logo .b{
  background: var(--grad-brio);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  font-size: 1.6em;
}
.brio-logo .rio{ color: var(--onyx); }
.brio-logo.on-dark .rio{ color: var(--champagne); }

/* ============================================================
   SPLASH (mostrato finché app.js non boota)
   ============================================================ */
#splash{
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  background: var(--bg);
  transition: opacity .3s ease, visibility .3s ease;
}
#splash.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
#splash .brio-logo{ font-size: 56px; }
#splash .tagline{ color: var(--text-muted); font-style: italic; font-size: 14px; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px 18px;
  border: 1px solid var(--line-strong);
  background: var(--bg-card);
  color: var(--text);
  border-radius: var(--r-md);
  font-size: 14px; font-weight: 500;
  transition: transform .08s ease, box-shadow .15s ease, background .15s ease;
  user-select: none;
}
.btn:hover{ box-shadow: var(--sh-1); }
.btn:active{ transform: translateY(1px); }
.btn:disabled{ opacity:.5; cursor:not-allowed; }

.btn-primary{
  background: var(--grad-brio); color: white; border-color: transparent;
}
.btn-primary:hover{ box-shadow: var(--sh-2); }

.btn-ghost{ background: transparent; border-color: transparent; }
.btn-ghost:hover{ background: var(--bg-soft); }

.btn-danger{ background: var(--danger); color: white; border-color: transparent; }

.btn-lg{ padding: 14px 22px; font-size: 16px; border-radius: var(--r-lg); }
.btn-xl{ padding: 22px 32px; font-size: 20px; border-radius: var(--r-lg); }

/* ============================================================
   INPUTS
   ============================================================ */
.input, .select, .textarea{
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-md);
  background: var(--bg-card);
  color: var(--text);
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.input:focus, .select:focus, .textarea:focus{
  border-color: var(--emerald);
  box-shadow: 0 0 0 3px rgba(16,185,129,.18);
}
.textarea{ resize: vertical; min-height: 80px; }
label.field{ display:block; margin-bottom: 12px; }
label.field > .label{ display:block; font-size:13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }

/* ============================================================
   CARD
   ============================================================ */
.card{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--sh-1);
}
.card-pad-lg{ padding: 28px; }
.card-flat{ box-shadow:none; }

/* ============================================================
   APP CHROME (header + sidebar)
   ============================================================ */
.app{
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh; min-height: 100dvh;
}
.app.no-sidebar{ grid-template-columns: 1fr; }

.sidebar{
  background: var(--onyx);
  color: var(--champagne);
  padding: 20px 14px;
  display: flex; flex-direction: column; gap: 4px;
  position: sticky; top: 0; height: 100vh; height: 100dvh;
}
.sidebar .brand{
  padding: 6px 8px 18px 8px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  margin-bottom: 8px;
}
.sidebar .brand .brio-logo{ font-size: 28px; }
.sidebar .nav-link{
  display:flex; align-items:center; gap:10px;
  padding: 10px 12px;
  border-radius: var(--r-md);
  color: rgba(239,230,213,.7);
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  transition: background .15s ease, color .15s ease;
}
.sidebar .nav-link:hover{ background: rgba(255,255,255,.06); color: var(--champagne); }
.sidebar .nav-link.active{ background: rgba(16,185,129,.18); color: var(--champagne); }
.sidebar .nav-link .icon{ width:18px; text-align:center; }
.sidebar .spacer{ flex: 1; }
.sidebar .user-box{
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-size: 13px;
  color: rgba(239,230,213,.7);
}
.sidebar .user-box .name{ color: var(--champagne); font-weight: 500; }
.sidebar .user-box .role{ font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--emerald); margin-top: 2px; }

main#appContent{
  padding: 24px 28px 60px 28px;
  min-width: 0;
}

/* Quando in modalità kiosk/full → no sidebar, full bleed */
.app.no-sidebar main#appContent{ padding: 0; }

/* ============================================================
   PAGE HEADER
   ============================================================ */
.page-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
.page-header h1{ font-size: 22px; margin: 0; font-weight: 600; letter-spacing: -.01em; }
.page-header .sub{ color: var(--text-muted); font-size: 13px; }
.page-header .page-actions{ display:flex; gap:8px; align-items:center; flex-wrap: wrap; }

/* ============================================================
   DASHBOARD
   ============================================================ */
.kpi-grid{
  display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  margin-bottom: 22px;
}
.kpi-card{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 16px 18px;
  box-shadow: var(--sh-1);
  position: relative;
}
.kpi-card .kpi-label{ font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
.kpi-card .kpi-value{ font-size: 26px; font-weight: 700; margin-top: 6px; letter-spacing: -.01em; color: var(--text); }
.kpi-card .kpi-sub{ font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.kpi-card.kpi-warn{ background: linear-gradient(180deg, #FFFBEB 0%, var(--bg-card) 60%); border-color: rgba(245,158,11,.4); }
.kpi-card.kpi-warn .kpi-value{ color: #B45309; }
.kpi-card.kpi-soft{ background: linear-gradient(180deg, #FEFCE8 0%, var(--bg-card) 60%); }
.kpi-card.kpi-good{ background: linear-gradient(180deg, rgba(16,185,129,.08) 0%, var(--bg-card) 60%); border-color: rgba(16,185,129,.25); }
.kpi-card.kpi-good .kpi-value{ color: var(--emerald); }

.dash-grid{ display:grid; gap: 16px; grid-template-columns: 2fr 1fr; margin-bottom: 22px; }
@media (max-width: 920px){ .dash-grid{ grid-template-columns: 1fr; } }

.dash-section{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  box-shadow: var(--sh-1);
  margin-bottom: 18px;
}
.dash-section h3{ font-size: 15px; margin: 0 0 12px; font-weight: 600; letter-spacing: -.01em; }
.dash-section-head{ display:flex; align-items:center; justify-content:space-between; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.dash-section-head h3{ margin: 0; }

/* Grafico 30 giorni */
.dash-chart .chart-svg{ height: 180px; display:block; }
.dash-chart .chart-foot{ display:flex; justify-content:space-between; margin-top: 8px; font-size: 13px; }

/* Heatmap orari (barre verticali) */
.dash-hourly .bars-row{ display:flex; align-items:flex-end; gap: 6px; height: 180px; padding-top: 8px; }
.dash-hourly .bar-col{ flex: 1; display:flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; min-width: 0; }
.dash-hourly .bar{ width: 100%; min-height: 4px; background: linear-gradient(180deg, var(--emerald), rgba(16,185,129,.6)); border-radius: 4px 4px 0 0; transition: height .25s ease; }
.dash-hourly .bar-hour{ font-size: 10px; color: var(--text-muted); margin-top: 4px; }

/* Top prodotti */
.top-list{ display:flex; flex-direction: column; gap: 8px; }
.top-row{
  display: grid;
  grid-template-columns: 22px 1fr auto 56px 90px;
  gap: 10px; align-items: center;
  padding: 6px 8px; border-radius: 6px;
}
.top-row:hover{ background: var(--bg-soft); }
.top-row .rank{ color: var(--text-muted); font-size: 12px; font-weight: 700; }
.top-row .name{ font-weight: 500; font-size: 14px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.top-row .bar-wrap{ position: relative; min-width: 40px; height: 6px; background: var(--bg-soft); border-radius: 999px; overflow: hidden; }
.top-row .bar-wrap .bar{ position: absolute; left: 0; top: 0; bottom: 0; background: var(--emerald); border-radius: 999px; }
.top-row .qty{ font-size: 13px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.top-row .rev{ font-size: 13px; font-weight: 600; text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }
@media (max-width: 720px){
  .top-row{ grid-template-columns: 22px 1fr 48px 80px; }
  .top-row .bar-wrap{ display: none; }
}

/* Allarmi magazzino */
.alarms-list{ display:flex; flex-direction: column; gap: 6px; }
.alarm-row{
  display:grid; grid-template-columns: 14px 1fr auto auto; gap: 12px;
  align-items: center; padding: 8px 10px;
  border: 1px solid var(--line); border-radius: 8px;
  font-size: 14px;
}
.alarm-row .dot{ width: 10px; height: 10px; border-radius: 50%; background: var(--warning); }
.alarm-row.alarm-crit .dot{ background: var(--danger); }
.alarm-row.alarm-crit{ border-color: rgba(220,38,38,.3); background: #FEF2F2; }
.alarm-row.alarm-warn{ border-color: rgba(245,158,11,.3); background: #FFFBEB; }
.alarm-row .al-name{ font-weight: 500; }
.alarm-row .al-stock{ font-variant-numeric: tabular-nums; color: var(--text); font-weight: 600; }
.alarm-row .al-thr{ font-size: 12px; color: var(--text-muted); }

/* ============================================================
   CHIUSURA CASSA
   ============================================================ */
.chiusura-locked{
  background: #ECFDF5; border: 1px solid rgba(16,185,129,.35);
  color: #065F46; border-radius: var(--r-md);
  padding: 12px 16px; margin-bottom: 16px;
  font-size: 14px; font-weight: 500;
}
.chiusura-grid{ display:grid; gap: 16px; grid-template-columns: 1.4fr 1fr; }
@media (max-width: 960px){ .chiusura-grid{ grid-template-columns: 1fr; } }

.ch-stats{
  display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
}
.ch-stat{
  background: var(--bg-soft);
  border-radius: var(--r-md);
  padding: 10px 12px;
}
.ch-stat .lab{ font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
.ch-stat .val{ font-size: 18px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
.ch-stat.warn{ background: #FFFBEB; }
.ch-stat.warn .val{ color: #B45309; }

.ch-table{ display:flex; flex-direction: column; gap: 6px; }
.ch-row{
  display:grid; grid-template-columns: 1fr 110px 150px 130px;
  align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  font-size: 14px;
}
.ch-row.ch-head{ font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; padding: 6px 10px; }
.ch-row.ch-total{ border-top: 1px solid var(--line); padding-top: 12px; font-weight: 600; font-size: 15px; }
.ch-row .ch-input{ padding: 8px 10px; font-size: 14px; text-align: right; font-variant-numeric: tabular-nums; }
.ch-row .diff-ok{ color: var(--text-muted); }
.ch-row .diff-pos{ color: var(--emerald); font-weight: 600; }
.ch-row .diff-neg{ color: var(--danger); font-weight: 600; }
@media (max-width: 720px){
  .ch-row{ grid-template-columns: 1fr 90px 110px 100px; gap: 6px; font-size: 13px; }
}

.ch-actions{ display:flex; gap: 16px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
.ch-actions .muted{ font-size: 12px; max-width: 360px; }

/* ============================================================
   CASSA FISCALE
   ============================================================ */
.cfi-banner{
  background: linear-gradient(180deg, #FEFCE8 0%, var(--bg-card) 60%);
  border: 1px solid rgba(245,158,11,.35);
  border-radius: var(--r-lg);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex; gap: 14px; align-items: flex-start;
}
.cfi-banner-text{ font-size: 13px; color: var(--text); line-height: 1.5; flex: 1; }
.cfi-banner-text code{ background: rgba(10,9,7,.06); padding: 1px 6px; border-radius: 4px; font-size: 11px; }
.cfi-badge{
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
  white-space: nowrap;
}
.cfi-badge.test{ background: #FEF3C7; color: #92400E; }
.cfi-badge.live{ background: #DCFCE7; color: #166534; }
.cfi-badge.partial{ background: #FEF3C7; color: #92400E; }
.cfi-badge.off{ background: var(--bg-soft); color: var(--text-muted); }

.cfi-form{ display:flex; flex-direction: column; gap: 0; }
.cfi-toggle{
  display:flex; align-items: center; gap: 12px;
  cursor: pointer; user-select: none;
}
.cfi-toggle input[type="checkbox"]{ width: 18px; height: 18px; cursor: pointer; }
.cfi-toggle .toggle-text{ font-size: 14px; }

.cfi-grid{
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.cfi-field{ margin: 0; }

.cfi-actions{ margin-top: 16px; display:flex; gap: 10px; flex-wrap: wrap; }

.cfi-save-bar{
  position: sticky; bottom: 0;
  background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
  padding: 16px 0;
  display:flex; justify-content: flex-end; gap: 10px;
}

.cfi-test-log{
  background: #0F172A; color: #E2E8F0;
  padding: 14px 16px;
  border-radius: var(--r-md);
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px; line-height: 1.5;
  white-space: pre-wrap;
  max-height: 320px; overflow: auto;
}

.cfi-log-list{ display:flex; flex-direction: column; gap: 6px; }
.cfi-log-row{
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 12px; align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 14px;
}
.cfi-log-row.cfi-log-ok{ background: #F0FDF4; border-color: rgba(16,185,129,.25); }
.cfi-log-row.cfi-log-err{ background: #FEF2F2; border-color: rgba(220,38,38,.25); }
.cfi-log-row.cfi-log-warn{ background: #FFFBEB; border-color: rgba(245,158,11,.25); }
.cfi-log-icon{ font-size: 18px; }
.cfi-log-main{ min-width: 0; }
.cfi-log-amount{ font-variant-numeric: tabular-nums; font-weight: 700; }
.cfi-log-test{
  display: inline-block;
  background: #FEF3C7; color: #92400E;
  padding: 1px 6px; border-radius: 4px;
  font-size: 9px; font-weight: 800; letter-spacing: .05em;
  vertical-align: middle;
}

/* Receipt modal: blocco fiscale */
.receipt-fiscal{
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: var(--r-md);
  text-align: left;
}
.receipt-fiscal.ok{ background: #F0FDF4; border: 1px solid rgba(16,185,129,.3); }
.receipt-fiscal.err{ background: #FEF2F2; border: 1px solid rgba(220,38,38,.3); }

/* ============================================================
   GRID UTILS
   ============================================================ */
.grid{ display:grid; gap: 16px; }
.grid-cards{ grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
.grid-2{ grid-template-columns: repeat(2, 1fr); }
.grid-3{ grid-template-columns: repeat(3, 1fr); }
@media (max-width: 720px){
  .grid-2, .grid-3{ grid-template-columns: 1fr; }
}

/* ============================================================
   LOGIN
   ============================================================ */
.login-screen{
  min-height: 100vh; min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  padding: 24px;
}
.login-box{
  width: 100%; max-width: 380px;
  background: var(--bg-card);
  border-radius: var(--r-xl);
  padding: 32px 28px;
  box-shadow: var(--sh-3);
  border: 1px solid var(--line);
}
.login-box .brio-logo{ font-size: 44px; margin-bottom: 8px; }
.login-box .tagline{ color: var(--text-muted); font-style: italic; font-size: 13px; margin-bottom: 24px; }
.login-error{ background: rgba(220,38,38,.08); color: var(--danger); padding: 10px 12px; border-radius: var(--r-md); font-size: 13px; margin-bottom: 12px; }

/* ============================================================
   HOME — selettore modulo
   ============================================================ */
.module-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.module-card{
  display:block;
  padding: 24px;
  border-radius: var(--r-lg);
  background: var(--bg-card);
  border: 1px solid var(--line);
  transition: transform .12s ease, box-shadow .15s ease, border-color .15s ease;
  cursor: pointer;
}
.module-card:hover{ transform: translateY(-2px); box-shadow: var(--sh-2); border-color: var(--line-strong); }
.module-card .icon{ font-size: 32px; margin-bottom: 12px; }
.module-card .title{ font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.module-card .desc{ color: var(--text-muted); font-size: 13px; }

/* ============================================================
   TOAST
   ============================================================ */
#toastHost{
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 8px; z-index: 9000;
  pointer-events: none;
}
.toast{
  background: var(--onyx); color: var(--champagne);
  padding: 12px 18px;
  border-radius: var(--r-md);
  box-shadow: var(--sh-3);
  font-size: 14px;
  animation: toast-in .2s ease;
  max-width: 480px;
}
.toast.success{ background: var(--emerald); color: white; }
.toast.error{ background: var(--danger); color: white; }
@keyframes toast-in{ from{ opacity:0; transform: translateY(8px); } to{ opacity:1; transform: translateY(0); } }

/* ============================================================
   UTILITY
   ============================================================ */
.flex{ display:flex; }
.flex-1{ flex:1; }
.gap-8{ gap:8px; }
.gap-12{ gap:12px; }
.gap-16{ gap:16px; }
.items-center{ align-items:center; }
.justify-between{ justify-content:space-between; }
.text-center{ text-align:center; }
.text-right{ text-align:right; }
.muted{ color: var(--text-muted); }
.dim{ color: var(--text-dim); }
.mt-8{ margin-top: 8px; } .mt-16{ margin-top: 16px; } .mt-24{ margin-top: 24px; }
.mb-8{ margin-bottom: 8px; } .mb-16{ margin-bottom: 16px; } .mb-24{ margin-bottom: 24px; }
.hidden{ display:none !important; }

/* ============================================================
   CASSA
   ============================================================ */
.cassa-layout{
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 20px;
  height: calc(100vh - 60px);
  height: calc(100dvh - 60px);
}
.cassa-products{ overflow-y: auto; padding-right: 4px; }
.cassa-tabs{ display:flex; gap:8px; margin-bottom: 16px; flex-wrap: wrap; }
.cassa-tab{
  padding: 10px 18px;
  border-radius: 999px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  font-weight: 500; cursor: pointer; font-size: 14px;
  transition: all .15s ease;
  user-select: none;
}
.cassa-tab:hover{ border-color: var(--line-strong); }
.cassa-tab.active{ background: var(--onyx); color: var(--champagne); border-color: var(--onyx); }
.cassa-tab .count{ display:inline-block; margin-left:6px; opacity:.5; font-size: 12px; }

.product-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}
.product-tile{
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 14px 12px;
  text-align: left;
  cursor: pointer;
  user-select: none;
  transition: transform .08s ease, box-shadow .15s ease, border-color .15s ease;
  min-height: 96px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.product-tile:hover{ box-shadow: var(--sh-2); border-color: var(--emerald); }
.product-tile:active{ transform: scale(.97); }
.product-tile .name{ font-weight: 600; font-size: 14px; line-height: 1.2; }
.product-tile .price{ color: var(--emerald); font-weight: 600; margin-top: 8px; font-size: 14px; }
.product-tile .shortcut{
  position: absolute; top: 6px; right: 8px;
  font-size: 11px; padding: 2px 6px;
  background: var(--smoke); color: var(--text-muted);
  border-radius: 4px; font-weight: 500;
}
/* Stock badge come fascetta superiore (non si sovrappone al nome) */
.product-tile{ padding-top: 0; overflow: hidden; }
.product-tile > .name{ margin-top: 2px; }
.product-tile .stock-badge{
  display: block;
  margin: 0 -12px 8px -12px;
  padding: 6px 10px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
  text-align: center;
}
.product-tile .stock-badge.stock-low{ background: #FEF3C7; color: #92400E; }
.product-tile .stock-badge.stock-out{ background: #FEE2E2; color: var(--danger); }

/* Tile in stato esaurito/limite: sfondo rosso chiaro, nome leggibile */
.product-tile.unavailable{
  cursor: not-allowed;
  background: #FEF2F2;
  border-color: rgba(220,38,38,.35);
}
.product-tile.unavailable .name{ color: var(--text); opacity: .85; }
.product-tile.unavailable .price{ color: var(--danger); text-decoration: line-through; opacity: .7; }
/* Padding-top normale per i tile con badge (la fascetta fa il suo lavoro) */
.product-tile:has(.stock-badge){ padding-top: 0; }
.product-tile:not(:has(.stock-badge)){ padding-top: 14px; }

/* Carrello */
.cassa-cart{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 16px;
  display: flex; flex-direction: column;
  height: 100%;
  overflow: hidden;
}
.cart-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px; }
.cart-head h3{ margin:0; font-size: 16px; font-weight: 600; }
.cart-head .clear{ font-size: 12px; color: var(--text-muted); cursor: pointer; background: transparent; border: 0; padding: 4px 8px; }
.cart-head .clear:hover{ color: var(--danger); }
.cart-items{ flex: 1; overflow-y: auto; margin: 0 -4px; }
.cart-empty{ text-align:center; padding: 40px 12px; color: var(--text-dim); }
.cart-empty .icon{ font-size: 36px; margin-bottom: 8px; opacity: .4; }
.cart-row{ display:grid; grid-template-columns: 1fr auto; gap: 8px; padding: 10px 4px; border-bottom: 1px solid var(--line); align-items: start; }
.cart-row:last-child{ border-bottom: 0; }
.cart-row .info{ font-size: 13px; }
.cart-row .info .name{ font-weight: 500; line-height: 1.2; }
.cart-row .info .unit{ color: var(--text-muted); font-size: 11px; margin-top: 2px; }
.cart-row .qty-ctrl{ display:flex; align-items:center; gap:4px; }
.cart-row .qty-btn{
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid var(--line); background: var(--bg-soft);
  display:flex; align-items:center; justify-content:center;
  cursor: pointer; font-size: 14px; user-select: none;
  padding: 0;
}
.cart-row .qty-btn:hover{ background: var(--smoke); }
.cart-row .qty-btn.remove{ color: var(--danger); }
.cart-row .qty{ min-width: 24px; text-align:center; font-weight: 600; font-size: 13px; }
.cart-row .row-total{ font-weight: 600; font-size: 13px; min-width: 60px; text-align:right; margin-top:6px; }

.cart-totals{ border-top: 2px solid var(--line-strong); padding-top: 12px; margin-top: 8px; }
.cart-total-line{ display:flex; justify-content:space-between; font-size: 13px; padding: 4px 0; color: var(--text-muted); }
.cart-total-line.grand{ color: var(--text); font-weight: 700; font-size: 18px; padding-top: 8px; }
.cart-actions{ margin-top: 12px; display:flex; flex-direction: column; gap: 6px; }
.cart-actions .btn{ width: 100%; padding: 14px; font-size: 15px; }

@media (max-width: 900px){
  .cassa-layout{ grid-template-columns: 1fr; height: auto; }
  .cassa-cart{ height: auto; }
}

/* ============================================================
   MODAL (per checkout)
   ============================================================ */
.modal-backdrop{
  position: fixed; inset: 0;
  background: rgba(10,9,7,.55);
  z-index: 8000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fade-in .15s ease;
}
@keyframes fade-in{ from{opacity:0} to{opacity:1} }
.modal{
  background: var(--bg-card);
  border-radius: var(--r-xl);
  box-shadow: var(--sh-3);
  width: 100%; max-width: 460px;
  max-height: 90vh;
  overflow: auto;
  animation: modal-in .2s ease;
}
@keyframes modal-in{ from{ opacity:0; transform: translateY(8px) scale(.98); } to{opacity:1; transform: translateY(0) scale(1);} }
.modal-head{ padding: 20px 24px; border-bottom: 1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
.modal-head h2{ margin:0; font-size: 18px; font-weight: 600; }
.modal-close{ background: transparent; border:0; cursor:pointer; font-size: 22px; color: var(--text-muted); padding: 4px 8px; border-radius: 6px; }
.modal-close:hover{ background: var(--bg-soft); color: var(--text); }
.modal-body{ padding: 20px 24px; }
.modal-foot{ padding: 16px 24px; border-top: 1px solid var(--line); display:flex; gap:8px; justify-content:flex-end; }

/* Checkout */
.pay-methods{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.pay-method{
  padding: 18px 14px; border-radius: var(--r-md); border: 2px solid var(--line);
  background: var(--bg-card); cursor: pointer; text-align: center;
  transition: all .15s ease;
}
.pay-method:hover{ border-color: var(--line-strong); }
.pay-method.active{ border-color: var(--emerald); background: rgba(16,185,129,.06); }
.pay-method .icon{ font-size: 26px; margin-bottom: 6px; }
.pay-method .label{ font-weight: 600; font-size: 14px; }

.cash-input{ margin-bottom: 12px; }
.cash-input label{ display:block; font-size:12px; color: var(--text-muted); margin-bottom: 6px; }
.cash-input input{ font-size: 28px; font-weight: 600; text-align: center; padding: 14px; }
.cash-quick{ display:flex; gap:6px; flex-wrap: wrap; margin-top: 8px; }
.cash-quick button{
  flex: 1 1 auto; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--line); background: var(--bg-soft); font-size: 13px; cursor: pointer;
}
.cash-quick button:hover{ background: var(--smoke); }
.change-box{ background: var(--bg-soft); padding: 14px; border-radius: var(--r-md); display:flex; justify-content:space-between; align-items:center; }
.change-box .label{ font-size:12px; color: var(--text-muted); }
.change-box .value{ font-weight: 700; font-size: 22px; color: var(--emerald); }

/* Receipt */
.receipt-success{ text-align: center; padding: 8px 0 16px; }
.receipt-success .icon{ font-size: 64px; margin-bottom: 8px; }
.receipt-success .num{ font-size: 36px; font-weight: 700; color: var(--emerald); margin: 4px 0; }
.receipt-success .hint{ color: var(--text-muted); font-size: 13px; }

/* ============================================================
   KIOSK · totem self-order
   ============================================================ */
.kiosk-root{
  position: fixed; inset: 0;
  background: var(--bg-soft);
  color: var(--text);
  font-family: var(--font-display);
  display: flex; flex-direction: column;
  overflow: hidden;
  z-index: 100;
}
.kiosk-exit{
  position: absolute; top: 0; right: 0;
  width: 60px; height: 60px;
  opacity: 0;
  z-index: 200;
  cursor: pointer;
}

/* ============================================================
   SPLASH KIOSK · "vetrina viva del momento" (3 fasce orarie)
   ============================================================ */
.kiosk-splash{
  flex:1; display:flex; flex-direction: column; align-items:center;
  justify-content: flex-start;
  text-align: center;
  padding: 56px 28px 20px;
  position: relative;
  cursor: pointer;
  overflow-y: auto;
  transition: background 1.2s ease, color 1.2s ease;
}
/* Variant per fascia: mattina/pranzo (chiari) e aperitivo (scuro cinematico) */
.kiosk-splash.kiosk-dp-mattina{
  background:
    radial-gradient(circle at 20% 25%, rgba(255,236,164,.55) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(16,185,129,.16) 0%, transparent 50%),
    linear-gradient(180deg, #FFFBF0 0%, var(--champagne) 100%);
}
.kiosk-splash.kiosk-dp-pranzo{
  background:
    radial-gradient(circle at 75% 20%, rgba(16,185,129,.20) 0%, transparent 50%),
    radial-gradient(circle at 25% 80%, rgba(30,58,138,.14) 0%, transparent 50%),
    linear-gradient(180deg, var(--bg-soft) 0%, var(--champagne) 100%);
}
.kiosk-splash.kiosk-dp-aperitivo{
  background:
    radial-gradient(circle at 30% 30%, rgba(30,58,138,.45) 0%, transparent 55%),
    radial-gradient(circle at 70% 70%, rgba(16,185,129,.18) 0%, transparent 50%),
    linear-gradient(180deg, #1B1B23 0%, #0F0F15 100%);
  color: var(--champagne);
}
.kiosk-splash.kiosk-dp-aperitivo .brio-logo .rio{ color: var(--champagne); }
.kiosk-splash.kiosk-dp-aperitivo .kiosk-hero-title{ color: var(--champagne); }
.kiosk-splash.kiosk-dp-aperitivo .kiosk-hero-sub,
.kiosk-splash.kiosk-dp-aperitivo .tagline-small,
.kiosk-splash.kiosk-dp-aperitivo .footnote{ color: rgba(239,230,213,.6); }
.kiosk-splash.kiosk-dp-aperitivo .quick-btn{ background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12); color: var(--champagne); }
.kiosk-splash.kiosk-dp-aperitivo .quick-btn.active{ background: var(--grad-brio); color: white; border-color: transparent; }

/* Chip orario in cima */
.kiosk-dp-chip{
  position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,.85);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 18px 8px 14px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  box-shadow: var(--sh-1);
  z-index: 2;
}
.kiosk-dp-chip .emoji{ font-size: 22px; line-height: 1; }
.kiosk-dp-chip .dp-label{ font-size: 12px; font-weight: 800; letter-spacing: .12em; color: var(--onyx); }
.kiosk-dp-chip .dp-time{ font-size: 10px; color: var(--text-muted); letter-spacing: .04em; }
.kiosk-splash.kiosk-dp-aperitivo .kiosk-dp-chip{
  background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.14);
}
.kiosk-splash.kiosk-dp-aperitivo .kiosk-dp-chip .dp-label{ color: var(--champagne); }
.kiosk-splash.kiosk-dp-aperitivo .kiosk-dp-chip .dp-time{ color: rgba(239,230,213,.55); }

/* Card hero centrale */
.kiosk-hero-card{
  display: flex; flex-direction: column; align-items: center;
  max-width: 680px;
}
.kiosk-splash .brio-logo{ font-size: 78px; margin-bottom: 0; line-height: 1; }
.tagline-small{ font-style: italic; color: var(--text-muted); font-size: 14px; margin-top: 2px; letter-spacing: .01em; }
.kiosk-hero-title{
  font-family: var(--font-display); font-style: italic; font-weight: 800;
  font-size: 56px; line-height: 1.05; letter-spacing: -.02em;
  color: var(--onyx); margin: 28px 0 8px;
}
.kiosk-hero-sub{
  color: var(--text-muted); font-size: 19px; line-height: 1.4;
  margin-bottom: 28px;
}
.kiosk-splash .cta{
  padding: 22px 56px;
  background: var(--grad-brio); color: white;
  border-radius: 999px;
  font-size: 20px; font-weight: 700; letter-spacing: .01em;
  box-shadow: var(--sh-3);
  border: 0;
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse{
  0%, 100%{ transform: scale(1); box-shadow: var(--sh-3); }
  50%{ transform: scale(1.04); box-shadow: 0 16px 40px rgba(16,185,129,.35); }
}

/* Riga 3 pulsanti "Ordine rapido" */
.kiosk-quick-row{
  display: flex; gap: 14px; margin-top: 36px;
  flex-wrap: wrap; justify-content: center;
  max-width: 760px;
}
.quick-btn{
  flex: 1 1 200px; min-width: 180px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 18px 14px;
  background: rgba(255,255,255,.7);
  border: 1px solid var(--line-strong);
  border-radius: 18px;
  cursor: pointer; user-select: none;
  transition: transform .12s ease, box-shadow .18s ease, border-color .18s ease;
  font-family: inherit;
}
.quick-btn:hover{ transform: translateY(-2px); box-shadow: var(--sh-2); }
.quick-btn:active{ transform: scale(.97); }
.quick-btn .qb-icon{ font-size: 28px; line-height: 1; }
.quick-btn .qb-label{ font-size: 13px; font-weight: 600; color: var(--text); }
.quick-btn.active{
  background: linear-gradient(180deg, rgba(16,185,129,.14), rgba(16,185,129,.04));
  border-color: var(--emerald);
  position: relative;
}
.quick-btn.active::after{
  content: "Adesso";
  position: absolute; top: -10px; right: 12px;
  background: var(--emerald); color: white;
  padding: 2px 10px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase;
}

.kiosk-splash .footnote{ margin-top: 24px; color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: .12em; }
.kiosk-splash .lang{
  position: absolute; top: 28px; right: 28px;
  display: flex; gap: 8px; z-index: 2;
}
.kiosk-splash .lang button{
  background: rgba(255,255,255,.7); border: 1px solid var(--line);
  border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 500;
  cursor: pointer; backdrop-filter: blur(4px); transition: all .15s ease;
}
.kiosk-splash .lang button.active{ background: var(--onyx); color: var(--champagne); border-color: var(--onyx); }
.kiosk-splash.kiosk-dp-aperitivo .lang button{ background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.12); color: var(--champagne); }
.kiosk-splash.kiosk-dp-aperitivo .lang button.active{ background: var(--champagne); color: var(--onyx); border-color: var(--champagne); }

/* ============================================================
   KIOSK TOTEM (splash v3 con hero image + featured cards)
   ============================================================ */
.kiosk-totem{
  width: 100%; max-width: 680px;
  display: flex; flex-direction: column; align-items: stretch;
  text-align: left;
  padding-top: 8px;
}
.kt-head{
  display: flex; flex-direction: column; align-items: flex-start;
  margin-bottom: 14px;
}
.kt-head .brio-logo{ font-size: 48px; margin: 0; line-height: 1; }
.kt-head .tagline-small{ font-style: italic; color: var(--text-muted); font-size: 12px; margin-top: 4px; letter-spacing: .01em; }

/* Hero image food · grande, dominante, con sfumatura inferiore verso lo sfondo.
   Altezza adattiva: 38vh con minimo (280) e massimo (440) → entra in viewport
   senza scroll su tipici totem (1080p) e desktop. */
.kt-hero-img{
  position: relative;
  width: 100%;
  height: clamp(280px, 38vh, 440px);
  border-radius: 28px;
  background-size: cover;
  background-position: center;
  background-color: var(--bg-soft);
  box-shadow: 0 18px 44px rgba(10,9,7,.20);
  margin-bottom: 18px;
  overflow: hidden;
}
/* Gradient sfumato in basso che fonde la foto con lo sfondo splash → continuità visiva */
.kt-hero-img::after{
  content: "";
  position: absolute; inset: auto 0 0 0; height: 36%;
  background: linear-gradient(180deg, transparent 0%, rgba(255,251,240,.55) 60%, rgba(255,251,240,.85) 100%);
  pointer-events: none;
}
.kiosk-splash.kiosk-dp-aperitivo .kt-hero-img::after{
  background: linear-gradient(180deg, transparent 0%, rgba(27,27,35,.6) 60%, rgba(15,15,21,.9) 100%);
}
@media (max-width: 720px){ .kt-hero-img{ height: 360px; border-radius: 22px; } }
@media (max-width: 480px){ .kt-hero-img{ height: 260px; border-radius: 18px; } }

/* Hero text · white-space: pre-line per rendere \n del JS come a-capo */
.kiosk-totem .kiosk-hero-title{
  font-family: var(--font-display); font-style: italic; font-weight: 800;
  font-size: 44px; line-height: 1.02; letter-spacing: -.025em;
  color: var(--onyx); margin: 0 0 8px;
  text-align: left;
  white-space: pre-line;
}
.kiosk-totem .kiosk-hero-sub{
  color: var(--text-muted); font-size: 16px; line-height: 1.4;
  margin: 0 0 16px;
  text-align: left;
}
.kiosk-totem .cta{
  width: 100%;
  padding: 18px 28px;
  background: var(--grad-brio); color: white;
  border-radius: 999px;
  font-size: 18px; font-weight: 700; letter-spacing: .01em;
  box-shadow: var(--sh-3);
  border: 0;
  cursor: pointer;
  animation: pulse 2.4s ease-in-out infinite;
  margin-bottom: 16px;
}

/* Featured cards row */
.kt-featured{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.kiosk-feat-card{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 12px 12px 14px;
  cursor: pointer; user-select: none;
  font-family: inherit;
  transition: transform .12s ease, box-shadow .15s ease;
  display: flex; flex-direction: column; align-items: stretch; gap: 10px;
}
.kiosk-feat-card:hover{ transform: translateY(-2px); box-shadow: var(--sh-2); }
.kiosk-feat-card:active{ transform: scale(.97); }
.ff-photo{
  width: 100%; aspect-ratio: 1 / 1;
  border-radius: 12px;
  background-size: cover; background-position: center;
  background-color: var(--bg-soft);
}
.ff-label{ font-size: 13px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.2; }

/* Footer minimale */
.kt-footer{
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px;
  font-size: 12px; color: var(--text-muted);
}
.kt-acc{ display: inline-flex; align-items: center; gap: 4px; }

/* Variant aperitivo (scuro): adatta colori interni */
.kiosk-splash.kiosk-dp-aperitivo .kiosk-totem .kiosk-hero-title{ color: var(--champagne); }
.kiosk-splash.kiosk-dp-aperitivo .kiosk-totem .kiosk-hero-sub{ color: rgba(239,230,213,.65); }
.kiosk-splash.kiosk-dp-aperitivo .kiosk-totem .tagline-small{ color: rgba(239,230,213,.55); }
.kiosk-splash.kiosk-dp-aperitivo .kiosk-totem .kt-footer{ color: rgba(239,230,213,.5); }
.kiosk-splash.kiosk-dp-aperitivo .kiosk-feat-card{
  background: rgba(255,255,255,.06);
  border-color: rgba(255,255,255,.12);
}
.kiosk-splash.kiosk-dp-aperitivo .ff-label{ color: var(--champagne); }
.kiosk-splash.kiosk-dp-aperitivo .ff-photo{ background-color: rgba(255,255,255,.04); }

/* STEP PAGAMENTO (Dove vorresti pagare?) */
.kiosk-pay{
  flex:1; display:flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px; position: relative;
  background:
    radial-gradient(circle at 50% 20%, rgba(16,185,129,.10) 0%, transparent 50%),
    linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
}
.kiosk-pay-back-btn{
  position: absolute; top: 28px; left: 28px;
  background: rgba(255,255,255,.8); border: 1px solid var(--line);
  border-radius: 999px; padding: 10px 18px; font-size: 14px;
  cursor: pointer; backdrop-filter: blur(4px);
}
.kiosk-pay h1{ font-size: 40px; font-style: italic; font-weight: 700; margin: 0 0 8px; text-align: center; letter-spacing: -.01em; }
.kiosk-pay .pay-sub{ font-size: 16px; color: var(--text-muted); margin-bottom: 44px; text-align: center; }
.kiosk-pay-cards{ display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; max-width: 800px; }
.kiosk-pay-card{
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: 24px;
  padding: 44px 32px;
  cursor: pointer; text-align: center;
  transition: transform .12s ease, box-shadow .2s ease, border-color .15s ease;
  user-select: none;
}
.kiosk-pay-card:hover{ transform: translateY(-4px); border-color: var(--emerald); box-shadow: 0 20px 40px rgba(10,9,7,.1); }
.kiosk-pay-card:active{ transform: translateY(0) scale(.98); }
.kiosk-pay-card .icon{ font-size: 84px; margin-bottom: 12px; }
.kiosk-pay-card .name{ font-size: 26px; font-weight: 700; margin-bottom: 6px; }
.kiosk-pay-card .desc{ font-size: 14px; color: var(--text-muted); }
.kiosk-pay-card.primary{ border-color: var(--emerald); background: linear-gradient(180deg, rgba(16,185,129,.04) 0%, var(--bg-card) 100%); }
@media (max-width: 720px){ .kiosk-pay-cards{ grid-template-columns: 1fr; } }

/* HEADER kiosk */
.kiosk-header{
  display:flex; align-items:center; justify-content:space-between;
  padding: 18px 28px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--line);
}
.kiosk-header .logo-small{ font-style: italic; font-weight: 700; font-size: 30px; }
.kiosk-header .logo-small .b{ background: var(--grad-brio); -webkit-background-clip:text; background-clip:text; color:transparent; }
.kiosk-header .home-btn{ padding: 10px 18px; border-radius: 999px; background: var(--bg-soft); border:0; font-size: 14px; cursor: pointer; }

/* LAYOUT kiosk shopping — sidebar categorie sinistra · content centro · carrello destra */
.kiosk-body{
  flex:1; overflow: hidden;
  display: grid;
  grid-template-columns: 168px 1fr 380px;
  gap: 0;
}
.kiosk-content{ overflow-y: auto; padding: 20px 28px 40px; }
@media (max-width: 1100px){
  .kiosk-body{ grid-template-columns: 132px 1fr 340px; }
}
@media (max-width: 900px){
  .kiosk-body{ grid-template-columns: 96px 1fr 280px; }
}

/* HERO offerta - più discreto per non rubare gerarchia ai prodotti */
.kiosk-hero{
  background: linear-gradient(120deg, var(--emerald) 0%, var(--midnight) 100%);
  color: white;
  border-radius: 16px;
  padding: 16px 22px;
  margin-bottom: 22px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 18px;
  transition: transform .12s ease, box-shadow .15s ease;
}
.kiosk-hero[data-action]:hover{ transform: translateY(-2px); box-shadow: 0 12px 30px rgba(16,185,129,.3); }
.kiosk-hero[data-action]:active{ transform: translateY(0) scale(.99); }
.kiosk-hero .badge{ display:inline-block; padding: 3px 10px; background: rgba(255,255,255,.18); border-radius: 999px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.kiosk-hero h2{ margin: 0 0 4px; font-size: 22px; font-style: italic; font-weight: 700; }
.kiosk-hero p{ margin: 0; opacity: .85; font-size: 13px; }
.kiosk-hero .icon{ font-size: 44px; }

/* CATEGORIE SIDEBAR sinistra · ogni card è verticale (icona sopra, nome sotto) */
.kiosk-cats-side{
  background: var(--bg-soft);
  border-right: 1px solid var(--line);
  padding: 16px 12px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.kiosk-cats-side::-webkit-scrollbar{ width: 6px; }
.kiosk-cats-side::-webkit-scrollbar-thumb{ background: rgba(10,9,7,.18); border-radius: 999px; }

.kiosk-cats-side .kiosk-cat{
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: 16px;
  padding: 14px 8px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; user-select: none;
  font-size: 13px; font-weight: 600;
  line-height: 1.15;
  text-align: center;
  transition: all .15s ease;
  box-shadow: var(--sh-1);
  min-height: 84px;
}
.kiosk-cats-side .kiosk-cat:hover{ border-color: var(--emerald); transform: translateY(-1px); box-shadow: var(--sh-2); }
.kiosk-cats-side .kiosk-cat.active{
  background: var(--onyx); color: var(--champagne); border-color: var(--onyx);
}
.kiosk-cats-side .kiosk-cat.active .icon{ filter: brightness(1.2); }
.kiosk-cats-side .kiosk-cat .icon{ font-size: 28px; line-height: 1; }

@media (max-width: 900px){
  .kiosk-cats-side{ padding: 10px 8px; gap: 8px; }
  .kiosk-cats-side .kiosk-cat{ padding: 10px 4px 8px; font-size: 11px; min-height: 70px; }
  .kiosk-cats-side .kiosk-cat .icon{ font-size: 22px; }
}

/* GRIGLIA prodotti big */
.kiosk-products{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}
.kiosk-product{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px 18px 16px;
  cursor: pointer;
  transition: transform .12s ease, box-shadow .2s ease;
  position: relative;
  overflow: hidden;
  min-height: 180px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.kiosk-product:hover{ transform: translateY(-3px); box-shadow: var(--sh-2); }
.kiosk-product:active{ transform: scale(.97); }
.kiosk-product .photo-area{
  height: 80px; background: var(--bg-soft); border-radius: 12px;
  display:flex; align-items:center; justify-content:center;
  font-size: 44px;
  margin-bottom: 10px;
}
.kiosk-product .name{ font-size: 17px; font-weight: 600; line-height: 1.2; margin-bottom: 4px; }
.kiosk-product .desc{ font-size: 12px; color: var(--text-muted); line-height: 1.3; margin-bottom: 8px; min-height: 32px; }
.kiosk-product .price-row{ display:flex; justify-content:space-between; align-items:center; }
.kiosk-product .price{ font-size: 20px; font-weight: 700; color: var(--emerald); }
.kiosk-product .add-btn{
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--onyx); color: var(--champagne);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700;
  border: 0;
}
.kiosk-product.unavailable{
  pointer-events: none;
  background: #FEF2F2;
  border-color: rgba(220,38,38,.35);
}
.kiosk-product.unavailable .name{ color: var(--text); opacity: .85; }
.kiosk-product.unavailable .desc{ opacity: .55; }
.kiosk-product.unavailable .photo-area{ filter: grayscale(.6); opacity: .55; }
.kiosk-product.unavailable .price{ text-decoration: line-through; color: var(--danger); opacity: .8; }
.kiosk-product.unavailable .add-btn{ background: rgba(220,38,38,.18); color: var(--danger); }

.kiosk-product .badge-promo{
  position: absolute; top: 12px; right: 12px;
  background: var(--emerald); color: white;
  padding: 4px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
}
.kiosk-product .kiosk-stock-badge{
  position: absolute; top: 12px; left: 12px;
  padding: 5px 12px; border-radius: 999px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
  z-index: 2;
}
.kiosk-product .kiosk-stock-badge.low{ background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
.kiosk-product .kiosk-stock-badge.out{ background: #FEE2E2; color: var(--danger); border: 1px solid rgba(220,38,38,.35); }

/* CARRELLO kiosk */
.kiosk-cart{
  background: var(--bg-card);
  border-left: 1px solid var(--line);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.kiosk-cart .cart-h{
  padding: 22px 24px 14px;
  border-bottom: 1px solid var(--line);
}
.kiosk-cart .cart-h h3{ margin:0; font-size: 20px; font-weight: 600; font-style: italic; }
.kiosk-cart .cart-h .count{ color: var(--text-muted); font-size: 13px; margin-top: 2px; }
.kiosk-cart .cart-l{ flex:1; overflow-y:auto; padding: 12px 18px; }
.kiosk-cart .cart-empty{ text-align:center; padding: 50px 12px; color: var(--text-dim); }
.kiosk-cart .cart-empty .icon{ font-size: 56px; opacity: .3; margin-bottom: 12px; }
.kiosk-cart .citem{ display:grid; grid-template-columns: 1fr auto; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); align-items:start; }
.kiosk-cart .citem:last-child{ border-bottom: 0; }
.kiosk-cart .citem .n{ font-weight: 600; font-size: 14px; }
.kiosk-cart .citem .u{ font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.kiosk-cart .citem .qc{ display: flex; align-items:center; gap: 6px; margin-top: 8px; }
.kiosk-cart .citem .qc button{
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--line); background: var(--bg-soft);
  font-size: 18px; cursor: pointer; padding: 0;
}
.kiosk-cart .citem .qc .qty{ min-width: 24px; text-align: center; font-weight: 600; }
.kiosk-cart .citem .lt{ font-size: 15px; font-weight: 700; align-self: end; }

.kiosk-cart .cart-f{
  padding: 18px 22px;
  border-top: 1px solid var(--line);
  background: var(--bg-soft);
}
.kiosk-cart .total-line{ display:flex; justify-content:space-between; padding: 4px 0; font-size: 14px; color: var(--text-muted); }
.kiosk-cart .total-line.grand{ font-size: 22px; color: var(--text); font-weight: 700; padding-top: 6px; }
.kiosk-cart .cta-pay{
  width: 100%; padding: 18px;
  background: var(--grad-brio); color: white;
  border: 0; border-radius: 14px;
  font-size: 17px; font-weight: 600;
  margin-top: 12px;
  cursor: pointer;
  box-shadow: var(--sh-2);
}
.kiosk-cart .cta-pay:disabled{ opacity:.4; cursor: not-allowed; box-shadow: none; }

/* CONFERMA kiosk */
.kiosk-success{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding: 40px;
}
.kiosk-success .ok{ font-size: 110px; margin-bottom: 8px; }
.kiosk-success h1{ font-size: 36px; margin: 0 0 4px; }
.kiosk-success .num{ font-size: 120px; font-weight: 800; color: var(--emerald); line-height: 1; margin: 12px 0; font-style: italic; }
.kiosk-success .msg{ font-size: 18px; color: var(--text-muted); max-width: 480px; margin: 0 auto 8px; }
.kiosk-success .countdown{ margin-top: 24px; color: var(--text-dim); font-size: 13px; }

/* PERSONALIZE modal (kiosk) - dialog centrato con backdrop blur */
.kpz-back{
  position: fixed; inset:0;
  background: rgba(10,9,7,.45);
  z-index: 150;
  display:flex; align-items:center; justify-content:center;
  padding: 24px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.kpz-sheet{
  background: var(--bg-card);
  border-radius: 24px;
  width: 100%; max-width: 680px;
  max-height: 88vh; overflow: auto;
  box-shadow: var(--sh-3);
  animation: sheet-in .25s cubic-bezier(.2,.8,.2,1);
}
@keyframes sheet-in{
  from{ transform: translateY(20px) scale(.97); opacity:0; }
  to  { transform: translateY(0) scale(1); opacity:1; }
}
/* Su totem verticale stretto (es. 22" portrait): torna a bottom sheet a tutta larghezza */
@media (max-aspect-ratio: 3/4) and (max-width: 1080px){
  .kpz-back{ align-items: flex-end; padding: 0; }
  .kpz-sheet{ border-radius: 24px 24px 0 0; max-width: 100%; }
}
.kpz-head{ padding: 22px 24px 12px; border-bottom: 1px solid var(--line); display:flex; align-items:center; justify-content:space-between; }
.kpz-head h2{ margin: 0; font-size: 22px; font-style: italic; font-weight: 700; }
.kpz-head .sub{ color: var(--text-muted); font-size: 13px; margin-top: 2px; }
.kpz-body{ padding: 18px 24px; }
.kpz-section{ margin-bottom: 16px; }
.kpz-section .lbl{ font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
.kpz-opt{
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 16px;
  background: var(--bg-soft);
  border-radius: 14px;
  margin-bottom: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  user-select: none;
  font-size: 15px;
}
.kpz-opt.selected{ background: rgba(16,185,129,.08); border-color: var(--emerald); }
.kpz-opt .check{
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--line-strong);
  display:flex; align-items:center; justify-content:center;
  font-size: 16px; color: white;
}
.kpz-opt.selected .check{ background: var(--emerald); border-color: var(--emerald); }
.kpz-opt .delta{ color: var(--emerald); font-weight: 600; font-size: 14px; margin-right: 12px; }
.kpz-foot{ padding: 14px 24px 22px; display:flex; gap:10px; border-top: 1px solid var(--line); background: var(--bg-card); position: sticky; bottom: 0; }
.kpz-foot button{
  flex: 1; padding: 18px; border: 0; border-radius: 14px;
  font-size: 16px; font-weight: 600; cursor: pointer;
}
.kpz-foot .cancel{ background: var(--bg-soft); color: var(--text); }
.kpz-foot .add{ background: var(--grad-brio); color: white; box-shadow: var(--sh-2); }

/* CROSS-SELL drawer (kiosk) */
.xsell{
  border-top: 1px solid var(--line);
  padding: 14px 20px 4px;
  background: var(--bg-soft);
}
.xsell h4{ margin: 0 0 10px; font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
.xsell-grid{ display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
.xsell-grid::-webkit-scrollbar{ display: none; }
.xsell-item{
  flex: 0 0 130px;
  background: var(--bg-card);
  border-radius: 12px; padding: 10px;
  text-align: center;
  border: 1px solid var(--line);
  cursor: pointer; transition: transform .1s ease;
}
.xsell-item:hover{ transform: translateY(-2px); }
.xsell-item .ico{
  font-size: 30px;
  margin: 0 auto 6px;
  width: 60px; height: 60px;
  display: flex; align-items: center; justify-content: center;
  background-color: var(--bg-soft);
  background-size: cover; background-position: center;
  border-radius: 12px;
}
.xsell-item .nm{ font-size: 12px; font-weight: 600; line-height: 1.2; min-height: 32px; }
.xsell-item .pr{ font-size: 13px; color: var(--emerald); font-weight: 700; margin-top: 4px; }

/* Customization chips nel carrello kiosk */
.citem .chips{ display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.citem .chips .chip{ font-size: 10px; padding: 2px 8px; background: var(--smoke); border-radius: 999px; color: var(--text); }

/* Bottone "Cancella tutto" nel carrello kiosk */
.kiosk-cart .cancel-all{
  background: transparent; border: 0; color: var(--danger);
  font-size: 12px; cursor: pointer; padding: 4px 8px;
  text-decoration: underline; text-underline-offset: 3px;
}
.kiosk-cart .citem .x-row{
  background: transparent; border: 0; color: var(--text-muted);
  font-size: 18px; cursor: pointer; padding: 0 4px; align-self: start;
}
.kiosk-cart .citem .x-row:hover{ color: var(--danger); }

/* Responsive kiosk: tablet portrait */
@media (max-width: 900px){
  .kiosk-body{ grid-template-columns: 1fr; }
  .kiosk-cart{ border-left: 0; border-top: 1px solid var(--line); }
}

/* ============================================================
   KDS — schermo retrobanco (kitchen display system)
   ============================================================ */
.kds-bar{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom: 20px; }
.kds-stat{ flex: 0 0 auto; padding: 10px 16px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--line); font-size: 13px; }
.kds-stat .num{ font-weight: 700; font-size: 18px; margin-right: 4px; }
.kds-stat.warn .num{ color: var(--warning); }
.kds-stat.danger .num{ color: var(--danger); }
.kds-stat.success .num{ color: var(--emerald); }
.kds-stat.info .num{ color: var(--midnight); }

.kds-section{ margin-bottom: 28px; }
.kds-section h3{
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  color: var(--text-muted); margin: 0 0 12px;
  display: flex; align-items: center; gap: 8px;
}
.kds-section h3 .badge{
  display: inline-flex; padding: 2px 8px; border-radius: 999px;
  background: var(--smoke); color: var(--text);
  font-size: 11px; font-weight: 600;
}
.kds-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.kds-empty{ color: var(--text-muted); font-size: 13px; padding: 16px 4px; }

.kds-card{
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: 14px;
  padding: 14px 16px 12px;
  position: relative;
  display: flex; flex-direction: column;
  min-height: 200px;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.kds-card.queued{ border-color: var(--smoke); }
.kds-card.queued.warn{ border-color: var(--warning); background: rgba(245,158,11,.04); }
.kds-card.queued.danger{ border-color: var(--danger); background: rgba(220,38,38,.04); animation: pulse-danger 1.6s ease-in-out infinite; }
@keyframes pulse-danger{
  0%, 100%{ box-shadow: 0 0 0 0 rgba(220,38,38,0); }
  50%{ box-shadow: 0 0 0 6px rgba(220,38,38,.18); }
}
.kds-card.preparing{ border-color: var(--midnight); background: rgba(30,58,138,.05); }
.kds-card.ready{ border-color: var(--emerald); background: rgba(16,185,129,.06); }
.kds-card.pending-pay{ border-color: var(--warning); background: rgba(245,158,11,.06); border-style: dashed; }

/* Pulse "nuovo ordine" — flash 3.5s quando arriva via realtime */
.kds-card.new-arrival{
  animation: kds-new-pulse 1s ease-out 3;
  border-color: var(--emerald) !important;
  position: relative;
}
.kds-card.new-arrival::before{
  content: "🔔 NUOVO";
  position: absolute; top: -10px; right: 12px;
  background: var(--emerald); color: white;
  font-size: 11px; font-weight: 700; letter-spacing: .04em;
  padding: 3px 10px; border-radius: 999px;
  box-shadow: var(--sh-2);
}
@keyframes kds-new-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(16,185,129,.55); }
  60%  { box-shadow: 0 0 0 14px rgba(16,185,129,0); }
  100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}

.kds-card .top{
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px;
}
.kds-card .num{
  font-size: 36px; font-weight: 800; font-style: italic;
  line-height: 1; color: var(--text);
}
.kds-card .ch{
  font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
  padding: 4px 8px; border-radius: 999px;
  background: var(--bg-soft); color: var(--text-muted);
  font-weight: 600;
}
.kds-card .items{
  flex: 1;
  list-style: none; margin: 0; padding: 0;
  font-size: 14px; line-height: 1.45;
}
.kds-card .items li{ padding: 4px 0; border-bottom: 1px dotted var(--line); }
.kds-card .items li:last-child{ border-bottom: 0; }
.kds-card .items .qty-badge{ display:inline-block; min-width: 22px; padding: 2px 6px; background: var(--smoke); border-radius: 6px; font-weight: 700; margin-right: 6px; font-size: 12px; }
.kds-card .items .custom{ display: block; padding-left: 28px; font-size: 11px; color: var(--text-muted); font-style: italic; }
.kds-card .note{ background: var(--bg-soft); padding: 6px 10px; border-radius: 8px; font-size: 12px; color: var(--text-muted); margin-top: 6px; }
